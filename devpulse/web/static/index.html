<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevPulse — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --canvas:          #010102;
      --surface-1:       #0d0e11;
      --surface-2:       #141519;
      --surface-3:       #1b1c21;
      --surface-4:       #22232a;
      --hairline:        #23252a;
      --hairline-strong: #2e3038;
      --primary:         #5e6ad2;
      --primary-hover:   #828fff;
      --ink:             #f7f8f8;
      --ink-muted:       #d0d6e0;
      --ink-subtle:      #8a8f98;
      --ink-tertiary:    #62666d;
      --success:         #27a644;
      --warn:            #d97706;
      --danger:          #e87b5a;
      --font: 'Inter', -apple-system, system-ui, sans-serif;
      --mono: 'JetBrains Mono', ui-monospace, monospace;
      --r-xs:4px; --r-sm:6px; --r-md:8px; --r-lg:12px; --r-xl:16px; --r-pill:9999px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body { background: var(--canvas); color: var(--ink); font-family: var(--font); font-size: 13px; line-height: 1.5; -webkit-font-smoothing: antialiased; display: flex; flex-direction: column; }

    .topbar { height: 48px; background: var(--surface-1); border-bottom: 1px solid var(--hairline); display: flex; align-items: center; padding: 0 20px; gap: 16px; flex-shrink: 0; z-index: 50; }
    .topbar-logo { display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--ink); }
    .logo-mark { width: 22px; height: 22px; background: var(--primary); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
    .topbar-name { font-size: 14px; font-weight: 600; letter-spacing: -0.3px; }
    .topbar-sep { width: 1px; height: 18px; background: var(--hairline-strong); }
    .topbar-addr { font-family: var(--mono); font-size: 11px; color: var(--ink-tertiary); background: var(--surface-2); border: 1px solid var(--hairline); border-radius: var(--r-sm); padding: 3px 8px; }
    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .status-pill { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; color: var(--success); background: rgba(39,166,68,0.1); border: 1px solid rgba(39,166,68,0.2); border-radius: var(--r-pill); padding: 3px 10px; }
    .status-pill.stopped { color: var(--danger); background: rgba(232,123,90,0.1); border-color: rgba(232,123,90,0.2); }
    .status-dot { width: 6px; height: 6px; background: var(--success); border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
    .status-pill.stopped .status-dot { background: var(--danger); animation: none; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
    .topbar-date { font-size: 12px; color: var(--ink-tertiary); }

    .layout { display: flex; flex: 1; min-height: 0; overflow: hidden; }

    .sidebar { width: 200px; flex-shrink: 0; background: var(--surface-1); border-right: 1px solid var(--hairline); display: flex; flex-direction: column; overflow-y: auto; padding: 12px 8px; gap: 2px; }
    .nav-label { font-size: 10px; font-weight: 600; letter-spacing: 0.6px; text-transform: uppercase; color: var(--ink-tertiary); padding: 8px 8px 4px; }
    .nav-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: var(--r-md); color: var(--ink-subtle); font-size: 13px; font-weight: 400; cursor: pointer; transition: background 0.12s, color 0.12s; user-select: none; text-decoration: none; }
    .nav-item:hover { background: var(--surface-2); color: var(--ink-muted); }
    .nav-item.active { background: var(--surface-3); color: var(--ink); }
    .nav-item svg { flex-shrink: 0; opacity: 0.7; }
    .nav-item.active svg { opacity: 1; }
    .nav-item .badge { margin-left: auto; font-size: 10px; font-weight: 600; background: var(--primary); color: #fff; border-radius: var(--r-pill); padding: 1px 6px; }

    .main { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }

    .view { display: none; flex-direction: column; gap: 16px; }
    .view.active { display: flex; animation: fadeUp 0.3s cubic-bezier(0.22,1,0.36,1) both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    .page-header { display: flex; align-items: flex-start; justify-content: space-between; }
    .page-title { font-size: 18px; font-weight: 600; letter-spacing: -0.4px; color: var(--ink); }
    .page-sub { font-size: 13px; color: var(--ink-subtle); margin-top: 2px; }
    .header-actions { display: flex; align-items: center; gap: 8px; }

    .btn { font-size: 12px; font-weight: 500; padding: 6px 12px; border-radius: var(--r-md); cursor: pointer; border: 1px solid var(--hairline); background: var(--surface-2); color: var(--ink-muted); transition: background 0.12s, border-color 0.12s; display: flex; align-items: center; gap: 6px; font-family: var(--font); }
    .btn:hover { background: var(--surface-3); border-color: var(--hairline-strong); color: var(--ink); }
    .btn-accent { background: var(--primary); color: #fff; border-color: transparent; }
    .btn-accent:hover { background: var(--primary-hover); color: #fff; }

    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .stats-row-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .stat-card { background: var(--surface-1); border: 1px solid var(--hairline); border-radius: var(--r-lg); padding: 14px 16px; position: relative; overflow: hidden; transition: border-color 0.2s; }
    .stat-card:hover { border-color: var(--hairline-strong); }
    .stat-label { font-size: 11px; font-weight: 500; color: var(--ink-subtle); letter-spacing: 0.2px; margin-bottom: 6px; }
    .stat-value { font-size: 24px; font-weight: 600; letter-spacing: -0.8px; color: var(--ink); line-height: 1; margin-bottom: 4px; }
    .stat-delta { font-size: 11px; color: var(--ink-tertiary); }
    .stat-delta.up { color: var(--success); }
    .stat-delta.down { color: var(--danger); }
    .stat-accent-bar { position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--primary); opacity: 0.5; }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

    .panel { background: var(--surface-1); border: 1px solid var(--hairline); border-radius: var(--r-lg); overflow: hidden; }
    .panel-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--hairline); }
    .panel-title { font-size: 13px; font-weight: 600; letter-spacing: -0.2px; color: var(--ink); display: flex; align-items: center; gap: 8px; }
    .panel-action { font-size: 11px; color: var(--primary); cursor: pointer; transition: color 0.12s; }
    .panel-action:hover { color: var(--primary-hover); }
    .panel-body { padding: 16px; }
    .panel-body-sm { padding: 12px 16px; }

    .tag { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: var(--r-pill); }
    .tag-success { background: rgba(39,166,68,0.1); color: var(--success); border: 1px solid rgba(39,166,68,0.2); }
    .tag-warn    { background: rgba(217,119,6,0.1);  color: var(--warn);    border: 1px solid rgba(217,119,6,0.2); }
    .tag-danger  { background: rgba(232,123,90,0.1); color: var(--danger);  border: 1px solid rgba(232,123,90,0.2); }
    .tag-primary { background: rgba(94,106,210,0.1); color: var(--primary); border: 1px solid rgba(94,106,210,0.2); }
    .tag-muted   { background: var(--surface-3); color: var(--ink-subtle); border: 1px solid var(--hairline); }

    .bar-chart { display: flex; flex-direction: column; gap: 10px; }
    .bar-row { display: grid; grid-template-columns: 100px 1fr 52px; align-items: center; gap: 10px; }
    .bar-label { font-size: 12px; font-weight: 500; color: var(--ink-muted); font-family: var(--mono); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-track { height: 6px; background: var(--surface-3); border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 3px; transition: width 0.8s cubic-bezier(0.22,1,0.36,1); }
    .bar-val { font-size: 12px; color: var(--ink-subtle); text-align: right; font-family: var(--mono); }

    .timeline { display: flex; flex-direction: column; gap: 6px; }
    .timeline-hours { display: flex; margin-bottom: 4px; }
    .hour-label { flex: 1; font-size: 10px; color: var(--ink-tertiary); font-family: var(--mono); text-align: center; }
    .timeline-row { display: flex; align-items: center; gap: 8px; }
    .timeline-proj { width: 84px; font-size: 11px; font-family: var(--mono); color: var(--ink-subtle); flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .timeline-blocks { flex: 1; display: flex; height: 18px; gap: 1px; }
    .tblock { height: 100%; border-radius: 2px; flex-shrink: 0; }

    .switch-chart { display: flex; align-items: flex-end; gap: 3px; height: 56px; }
    .switch-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; height: 100%; justify-content: flex-end; }
    .switch-bar { width: 100%; border-radius: 2px 2px 0 0; min-height: 2px; }
    .switch-bar.high { background: var(--danger); }
    .switch-bar.med  { background: var(--warn); opacity: 0.8; }
    .switch-bar.low  { background: var(--success); opacity: 0.8; }
    .switch-bar.none { background: var(--surface-3); }
    .switch-day { font-size: 9px; color: var(--ink-tertiary); font-family: var(--mono); }

    .toil-list { display: flex; flex-direction: column; }
    .toil-item { padding: 12px 0; border-bottom: 1px solid var(--hairline); display: flex; flex-direction: column; gap: 6px; }
    .toil-item:last-child { border-bottom: none; }
    .toil-header { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .toil-cmd { font-family: var(--mono); font-size: 11px; color: var(--ink-muted); background: var(--surface-2); border: 1px solid var(--hairline); border-radius: var(--r-xs); padding: 3px 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .toil-freq { font-size: 11px; font-family: var(--mono); color: var(--ink-tertiary); flex-shrink: 0; }
    .toil-body { display: flex; align-items: center; gap: 8px; }
    .toil-suggest { font-size: 11px; color: var(--success); font-family: var(--mono); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .toil-apply { flex-shrink: 0; font-size: 11px; font-weight: 500; color: var(--primary); cursor: pointer; padding: 3px 10px; border-radius: var(--r-sm); border: 1px solid rgba(94,106,210,0.3); background: rgba(94,106,210,0.06); transition: background 0.12s, border-color 0.12s; font-family: var(--font); }
    .toil-apply:hover:not(:disabled) { background: rgba(94,106,210,0.14); border-color: var(--primary); }
    .toil-apply:disabled { opacity: 0.6; cursor: default; }
    .toil-meta { font-size: 11px; color: var(--ink-tertiary); }

    .activity-list { display: flex; flex-direction: column; }
    .activity-item { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--hairline); }
    .activity-item:last-child { border-bottom: none; }
    .activity-time { font-family: var(--mono); font-size: 10px; color: var(--ink-tertiary); width: 44px; flex-shrink: 0; }
    .activity-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .activity-text { font-size: 12px; color: var(--ink-subtle); flex: 1; }
    .activity-text code { font-family: var(--mono); font-size: 11px; color: var(--ink-muted); background: var(--surface-3); border-radius: 3px; padding: 0 4px; }
    .activity-proj { font-family: var(--mono); font-size: 10px; color: var(--ink-tertiary); background: var(--surface-3); border-radius: var(--r-xs); padding: 1px 6px; flex-shrink: 0; }

    .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .week-day { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .week-bar-wrap { width: 100%; height: 40px; display: flex; align-items: flex-end; }
    .week-bar { width: 100%; border-radius: 2px 2px 0 0; min-height: 3px; }
    .week-bar.today { background: var(--primary); opacity: 0.8; }
    .week-bar.past  { background: var(--surface-4); }
    .week-bar.future{ background: var(--surface-3); opacity: 0.3; }
    .week-label { font-size: 9px; color: var(--ink-tertiary); font-family: var(--mono); }
    .week-hours { font-size: 9px; color: var(--ink-subtle); font-family: var(--mono); }

    .donut-wrap { display: flex; align-items: center; gap: 16px; }
    .donut-legend { display: flex; flex-direction: column; gap: 6px; flex: 1; }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--ink-muted); }
    .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
    .legend-pct { margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--ink-subtle); }

    .insights-list { display: flex; flex-direction: column; gap: 8px; }
    .insight-item { display: flex; gap: 10px; align-items: flex-start; padding: 10px 12px; background: var(--surface-2); border: 1px solid var(--hairline); border-radius: var(--r-md); }
    .insight-icon { width: 28px; height: 28px; border-radius: var(--r-sm); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
    .insight-text { font-size: 12px; color: var(--ink-muted); line-height: 1.6; }
    .insight-text strong { color: var(--ink); font-weight: 500; }

    .proj-table { width: 100%; border-collapse: collapse; }
    .proj-table th { font-size: 10px; font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase; color: var(--ink-tertiary); padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--hairline); }
    .proj-table td { padding: 10px 12px; border-bottom: 1px solid var(--hairline); font-size: 12px; color: var(--ink-muted); vertical-align: middle; }
    .proj-table tr:last-child td { border-bottom: none; }
    .proj-table tr:hover td { background: var(--surface-2); }
    .proj-name { font-family: var(--mono); font-size: 12px; font-weight: 500; color: var(--ink); }
    .proj-bar-cell { width: 140px; }
    .proj-mini-bar { height: 4px; border-radius: 2px; background: var(--surface-3); overflow: hidden; margin-top: 3px; }
    .proj-mini-fill { height: 100%; border-radius: 2px; transition: width 0.8s cubic-bezier(0.22,1,0.36,1); }

    .config-section { display: flex; flex-direction: column; gap: 2px; }
    .config-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--hairline); }
    .config-row:last-child { border-bottom: none; }
    .config-key { font-size: 13px; color: var(--ink); font-weight: 500; }
    .config-desc { font-size: 11px; color: var(--ink-tertiary); margin-top: 2px; }
    .config-val { font-family: var(--mono); font-size: 12px; color: var(--ink-muted); background: var(--surface-2); border: 1px solid var(--hairline); border-radius: var(--r-sm); padding: 4px 10px; }
    .config-select { font-family: var(--mono); font-size: 12px; color: var(--ink-muted); background: var(--surface-2); border: 1px solid var(--hairline); border-radius: var(--r-sm); padding: 4px 10px; cursor: pointer; appearance: none; }
    .toggle { width: 32px; height: 18px; border-radius: var(--r-pill); background: var(--surface-3); border: 1px solid var(--hairline); cursor: pointer; position: relative; transition: background 0.15s; flex-shrink: 0; }
    .toggle.on { background: var(--primary); border-color: var(--primary); }
    .toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 12px; height: 12px; border-radius: 50%; background: var(--ink-subtle); transition: transform 0.15s, background 0.15s; }
    .toggle.on::after { transform: translateX(14px); background: #fff; }

    .heatmap-grid { display: grid; grid-template-columns: 40px repeat(10, 1fr); gap: 2px; }
    .heatmap-cell { height: 20px; border-radius: 2px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-family: var(--mono); }
    .heatmap-label { font-size: 10px; color: var(--ink-tertiary); font-family: var(--mono); display: flex; align-items: center; }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--surface-4); }

    .divider { height: 1px; background: var(--hairline); margin: 4px 0; }
    .loading-text { color: var(--ink-tertiary); font-size: 12px; padding: 20px; text-align: center; }
    .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--hairline-strong); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header class="topbar">
  <a href="/" class="topbar-logo">
    <div class="logo-mark">
      <svg width="12" height="12" viewBox="0 0 14 14" fill="none">
        <path d="M2 7C2 4.24 4.24 2 7 2s5 2.24 5 5-2.24 5-5 5-5-2.24-5-5z" stroke="#fff" stroke-width="1.4" fill="none"/>
        <path d="M7 4v3l2 1.5" stroke="#fff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <span class="topbar-name">DevPulse</span>
  </a>
  <div class="topbar-sep"></div>
  <span class="topbar-addr" id="topbar-addr">localhost:8765</span>
  <div class="topbar-right">
    <div class="status-pill" id="status-pill"><span class="status-dot"></span><span id="status-text">checking…</span></div>
    <span class="topbar-date" id="topbar-date"></span>
  </div>
</header>

<div class="layout">
  <nav class="sidebar">
    <span class="nav-label">Overview</span>
    <a class="nav-item active" data-view="today" href="#">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.3"/><path d="M7 4.5V7l1.5 1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      Today
    </a>
    <a class="nav-item" data-view="week" href="#">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1.5" y="3" width="11" height="9" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M5 1.5v3M9 1.5v3M1.5 6.5h11" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      This week
    </a>
    <a class="nav-item" data-view="projects" href="#">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 10.5V5l4-3 4 3v5.5" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><rect x="5" y="7.5" width="4" height="3" rx="0.5" stroke="currentColor" stroke-width="1.3"/></svg>
      Projects
    </a>
    <span class="nav-label" style="margin-top:8px">Analysis</span>
    <a class="nav-item" data-view="toil" href="#">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2v2M7 10v2M2 7H4M10 7h2M3.64 3.64l1.42 1.42M8.94 8.94l1.42 1.42M3.64 10.36l1.42-1.42M8.94 5.06l1.42-1.42" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      Toil
      <span class="badge" id="toil-badge"></span>
    </a>
    <a class="nav-item" data-view="focus" href="#">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7h1.5M10.5 7H12M7 2v1.5M7 10.5V12M4.4 4.4l1.05 1.05M8.55 8.55l1.05 1.05M8.55 5.45 7.5 6.5M4.4 9.6l1.05-1.05" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><circle cx="7" cy="7" r="2" stroke="currentColor" stroke-width="1.3"/></svg>
      Focus
    </a>
    <a class="nav-item" data-view="insights" href="#">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 10.5l3-4 2.5 2 3-5L12 6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Insights
    </a>
    <span class="nav-label" style="margin-top:8px">Settings</span>
    <a class="nav-item" data-view="config" href="#">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="1.8" stroke="currentColor" stroke-width="1.3"/><path d="M7 1.5v1.2M7 11.3v1.2M1.5 7h1.2M11.3 7h1.2M3.2 3.2l.85.85M9.95 9.95l.85.85M3.2 10.8l.85-.85M9.95 4.05l.85-.85" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      Config
    </a>
  </nav>

  <main class="main" id="main">
    <div class="view active" id="view-today"><div class="loading-text"><span class="spinner"></span> Loading…</div></div>
    <div class="view" id="view-week"></div>
    <div class="view" id="view-projects"></div>
    <div class="view" id="view-toil"></div>
    <div class="view" id="view-focus"></div>
    <div class="view" id="view-insights"></div>
    <div class="view" id="view-config"></div>
  </main>
</div>

<script>
const COLORS = ['#5e6ad2','#fbbf24','#4ade80','#f472b6','#22d3ee','#fb923c','#a78bfa','#34d399'];
const state = {};

function fmtDur(m) {
  if (m == null || m === 0) return '0m';
  const h = Math.floor(m / 60), mi = Math.round(m % 60);
  return h > 0 ? `${h}h ${String(mi).padStart(2,'0')}m` : `${mi}m`;
}
function fmtHours(m) {
  const h = Math.floor(m / 60), mi = Math.round(m % 60);
  return h > 0 ? `${h}h ${String(mi).padStart(2,'0')}m` : `${mi}m`;
}
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

async function api(path, opts) {
  const r = await fetch(path, opts);
  if (!r.ok) throw new Error(`${r.status}`);
  return r.json();
}

// ── SVG donut ───────────────────────────────────────────────────
function makeDonut(svgEl, data, cx, cy, r, strokeW) {
  svgEl.innerHTML = '';
  const circ = 2 * Math.PI * r;
  let offset = 0;
  data.forEach(d => {
    const dash = d.pct * circ;
    const gap = circ - dash;
    const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    c.setAttribute('cx', cx); c.setAttribute('cy', cy); c.setAttribute('r', r);
    c.setAttribute('fill', 'none');
    c.setAttribute('stroke', d.color);
    c.setAttribute('stroke-width', strokeW);
    c.setAttribute('stroke-dasharray', `${dash} ${gap}`);
    c.setAttribute('stroke-dashoffset', -(offset * circ));
    c.setAttribute('transform', `rotate(-90 ${cx} ${cy})`);
    c.setAttribute('opacity', '0.85');
    svgEl.appendChild(c);
    offset += d.pct;
  });
}

function makeSwitchChart(el, data, maxH) {
  el.innerHTML = '';
  const maxV = Math.max(...data.map(s => s.v || 0), 1);
  data.forEach(s => {
    el.innerHTML += `<div class="switch-bar-wrap"><div class="switch-bar ${s.cls}" style="height:${s.v > 0 ? Math.max(s.v / maxV * maxH, 4) : 2}px"></div><span class="switch-day">${s.d}</span></div>`;
  });
}

function makeActivityList(el, items) {
  el.innerHTML = '';
  items.forEach(a => {
    el.innerHTML += `<div class="activity-item"><span class="activity-time">${esc(a.time)}</span><span class="activity-dot" style="background:${a.color}"></span><span class="activity-text">${a.text}</span><span class="activity-proj">${esc(a.proj)}</span></div>`;
  });
}

    `;

    const fbc = document.getElementById('focus-block-chart');
    if (dailyF.length) {
      const maxV = Math.max(...dailyF.map(d => d.longest_block || 0), 1);
      dailyF.forEach(d => {
        const v = d.longest_block || 0;
        fbc.innerHTML += `<div class="switch-bar-wrap"><div class="switch-bar" style="height:${v > 0 ? Math.max(v/maxV*70,4) : 2}px;background:var(--success);opacity:${d.is_today?1:0.6}"></div><span class="switch-day">${d.day}</span></div>`;
      });
    }

    const fsc = document.getElementById('focus-switch-chart');
    const swData = dailySw.map(d => ({ d: d.day, v: d.switches, cls: d.cls }));
    makeSwitchChart(fsc, swData, 70);

    const fbl = document.getElementById('focus-blocks-list');
    const blocks = t.deep_work_blocks || [];
    if (blocks.length) {
      blocks.sort((a, b) => (b.duration_minutes || 0) - (a.duration_minutes || 0));
      blocks.slice(0, 6).forEach((b, i) => {
        fbl.innerHTML += `<div class="activity-item"><span class="activity-time">${esc(b.start||'')}–${esc(b.end||'')}</span><span class="activity-dot" style="background:${COLORS[i%COLORS.length]}"></span><span class="activity-text">${esc(b.project||'')}</span><span class="activity-proj">${fmtDur(b.duration_minutes)}</span></div>`;
      });
    } else {
      fbl.innerHTML = '<div style="color:var(--ink-tertiary);font-size:12px;padding:8px 0">No deep work blocks today</div>';
    }

    const ftEl = document.getElementById('focus-transitions');
    if (ftEl && w.top_transitions) {
      const maxC = w.top_transitions[0]?.count || 1;
      w.top_transitions.forEach((tr, i) => {
        ftEl.innerHTML += `<div class="bar-row"><span class="bar-label">${esc(tr.from_project)} → ${esc(tr.to_project)}</span><div class="bar-track"><div class="bar-fill" style="width:${(tr.count/maxC*100)}%;background:${COLORS[i%COLORS.length]}"></div></div><span class="bar-val">×${tr.count}</span></div>`;
      });
    }
  } catch (err) {
    el.innerHTML = `<div class="loading-text" style="color:var(--danger)">Failed to load: ${esc(err.message)}</div>`;
  }
}

// ── INSIGHTS ─────────────────────────────────────────────────────
async function renderInsights() {
  const el = document.getElementById('view-insights');
  el.innerHTML = `
    <div class="page-header">
      <div><div class="page-title">AI Insights</div><div class="page-sub">Natural language analysis of your workflow patterns</div></div>
      <div class="header-actions">
        <span class="tag tag-primary" style="font-size:11px;padding:4px 10px" id="llm-tag">checking…</span>
        <button class="btn btn-accent" id="run-insights-btn" disabled><span class="spinner" id="insights-spinner"></span> Loading insights…</button>
      </div>
    </div>
    <div class="stats-row" id="insights-stats" style="display:none"></div>
    <div class="panel" id="insights-panel" style="display:none">
      <div class="panel-header"><span class="panel-title">Workflow insights</span></div>
      <div class="panel-body"><div class="insights-list" id="full-insights-list"></div></div>
    </div>
    <div class="panel">
      <div class="panel-header"><span class="panel-title">Ask DevPulse</span><span class="tag tag-muted">Natural language query</span></div>
      <div class="panel-body">
        <div style="display:flex;gap:8px;margin-bottom:12px">
          <input id="insight-query" type="text" placeholder="e.g. What project should I focus on tomorrow?" style="flex:1;background:var(--surface-2);border:1px solid var(--hairline);border-radius:var(--r-md);padding:8px 12px;font-size:13px;color:var(--ink);font-family:var(--font);outline:none;" />
          <button class="btn btn-accent" id="ask-btn">Ask</button>
        </div>
        <div id="ask-response" style="display:none;background:var(--surface-2);border:1px solid var(--hairline);border-radius:var(--r-md);padding:12px;font-size:12px;color:var(--ink-muted);line-height:1.7"></div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px" id="quick-queries"></div>
      </div>
    </div>
  `;

  const quickQs = ['What project should I focus on tomorrow?', 'When is my best time for deep work?', 'What command should I automate next?', 'How did this week compare to last?'];
  const qqEl = document.getElementById('quick-queries');
  quickQs.forEach(q => {
    const btn = document.createElement('button');
    btn.className = 'btn';
    btn.style.fontSize = '11px';
    btn.textContent = q;
    btn.addEventListener('click', () => { document.getElementById('insight-query').value = q; triggerAsk(q); });
    qqEl.appendChild(btn);
  });

  document.getElementById('ask-btn').addEventListener('click', () => {
    const q = document.getElementById('insight-query').value.trim();
    if (q) triggerAsk(q);
  });
  document.getElementById('insight-query').addEventListener('keydown', e => {
    if (e.key === 'Enter') { const q = e.target.value.trim(); if (q) triggerAsk(q); }
  });

  try {
    const ins = await api('/api/insights');
    const tag = document.getElementById('llm-tag');
    tag.textContent = ins.available ? `${ins.provider} · ${ins.model || 'auto'} · ${ins.provider === 'ollama' ? 'local' : 'cloud'}` : 'No LLM configured';

    const btn = document.getElementById('run-insights-btn');
    btn.disabled = false;
    btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1.5v2M6 8.5v2M1.5 6h2M8.5 6h2M3 3l1.4 1.4M7.6 7.6 9 9M3 9l1.4-1.4M7.6 4.4 9 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>Re-run analysis';
    btn.addEventListener('click', renderInsights);

    if (ins.insights) {
      const statsEl = document.getElementById('insights-stats');
      statsEl.style.display = '';
      statsEl.innerHTML = `
        <div class="stat-card"><div class="stat-accent-bar"></div><div class="stat-label">LLM provider</div><div class="stat-value" style="font-size:16px;letter-spacing:-0.3px">${esc(ins.provider)}</div><div class="stat-delta" style="color:var(--success)">${ins.provider === 'ollama' ? 'local · free' : 'cloud'}</div></div>
        <div class="stat-card"><div class="stat-label">Model</div><div class="stat-value" style="font-size:16px;letter-spacing:-0.3px;font-family:var(--mono)">${esc(ins.model||'auto')}</div><div class="stat-delta">${esc(ins.provider)}</div></div>
        <div class="stat-card"><div class="stat-label">Last analyzed</div><div class="stat-value" style="font-size:16px;letter-spacing:-0.3px">${new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false})}</div><div class="stat-delta">just now</div></div>
        <div class="stat-card"><div class="stat-label">Data range</div><div class="stat-value" style="font-size:16px;letter-spacing:-0.3px">30 days</div><div class="stat-delta">activity analyzed</div></div>
      `;

      const panel = document.getElementById('insights-panel');
      panel.style.display = '';
      const il = document.getElementById('full-insights-list');
      const lines = ins.insights.split('\n').filter(l => l.trim());
      const iconSvgs = {
        success: { bg:'rgba(39,166,68,0.1)', svg:'<path d="M2.5 6.5l3 3 5-5" stroke="#4ade80" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>' },
        warn:    { bg:'rgba(217,119,6,0.1)',  svg:'<path d="M6.5 3v3.5" stroke="#d97706" stroke-width="1.3" stroke-linecap="round"/><circle cx="6.5" cy="9" r=".8" fill="#d97706"/>' },
        primary: { bg:'rgba(94,106,210,0.1)', svg:'<path d="M2 9.5l2-3 2 2 2-4 2 3" stroke="var(--primary)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>' },
      };
      const iconKeys = ['success', 'warn', 'primary'];
      lines.forEach((line, i) => {
        const clean = line.replace(/^[\d\.\-\*]+\s*/, '').trim();
        if (!clean) return;
        const ic = iconSvgs[iconKeys[i % iconKeys.length]];
        il.innerHTML += `<div class="insight-item"><div class="insight-icon" style="background:${ic.bg}"><svg width="13" height="13" viewBox="0 0 13 13" fill="none">${ic.svg}</svg></div><span class="insight-text">${esc(clean)}</span></div>`;
      });
    } else {
      const panel = document.getElementById('insights-panel');
      panel.style.display = '';
      document.getElementById('full-insights-list').innerHTML = '<div style="color:var(--ink-tertiary);font-size:12px;padding:8px 0">No insights available. Configure an LLM provider to enable AI analysis.</div>';
    }
  } catch (err) {
    document.getElementById('llm-tag').textContent = 'error';
    document.getElementById('run-insights-btn').disabled = false;
    document.getElementById('run-insights-btn').textContent = 'Retry';
  }
}

async function triggerAsk(q) {
  const resp = document.getElementById('ask-response');
  resp.style.display = 'block';
  resp.innerHTML = '<span class="spinner"></span> thinking…';
  try {
    const r = await api('/api/insights/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q }),
    });
    resp.textContent = r.answer || 'No response';
  } catch (err) {
    resp.textContent = 'Error: ' + err.message;
  }
}

// ── CONFIG ───────────────────────────────────────────────────────
async function renderConfig() {
  const el = document.getElementById('view-config');
  try {
    const [cfg, st] = await Promise.all([
      api('/api/config'),
      api('/api/status'),
    ]);
    state.config = cfg;
    state.status = st;

    const llm = cfg.llm || {};
    const collectors = cfg.collectors || {};
    const ui = cfg.ui || {};
    const general = cfg.general || {};

    el.innerHTML = `
      <div class="page-header">
        <div><div class="page-title">Configuration</div><div class="page-sub">devpulse config · ~/.devpulse/config.toml</div></div>
        <div class="header-actions"><button class="btn btn-accent" id="save-config-btn">Save changes</button></div>
      </div>

      <div class="two-col">
        <div class="panel">
          <div class="panel-header"><span class="panel-title">LLM Provider</span></div>
          <div class="config-section">
            <div class="config-row"><div><div class="config-key">Provider</div><div class="config-desc">Which LLM backend to use for suggestions and insights</div></div><select class="config-select" id="cfg-llm-provider">${['ollama','claude','groq','openai','none'].map(v=>`<option${v===(llm.provider||'ollama')?' selected':''}>${v}${v==='ollama'?' (local)':''}</option>`).join('')}</select></div>
            <div class="config-row"><div><div class="config-key">Model</div><div class="config-desc">Model name for the selected provider</div></div><code class="config-val">${esc(llm.model||'auto')}</code></div>
            <div class="config-row"><div><div class="config-key">Ollama host</div><div class="config-desc">Base URL for local Ollama instance</div></div><code class="config-val">${esc((llm.ollama||{}).host||'localhost:11434')}</code></div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-header"><span class="panel-title">Collection</span></div>
          <div class="config-section">
            <div class="config-row"><div><div class="config-key">Shell hook</div><div class="config-desc">Capture every command via zsh/bash precmd</div></div><div class="toggle ${collectors.shell !== false ? 'on' : ''}" data-cfg="collectors.shell"></div></div>
            <div class="config-row"><div><div class="config-key">Git watcher</div><div class="config-desc">Track commits, branches, stash events</div></div><div class="toggle ${collectors.git !== false ? 'on' : ''}" data-cfg="collectors.git"></div></div>
            <div class="config-row"><div><div class="config-key">Window focus</div><div class="config-desc">Track active app for context switch detection</div></div><div class="toggle ${collectors.window !== false ? 'on' : ''}" data-cfg="collectors.window"></div></div>
            <div class="config-row"><div><div class="config-key">File watcher</div><div class="config-desc">Track .env and config file edits</div></div><div class="toggle ${collectors.file_watcher === true ? 'on' : ''}" data-cfg="collectors.file_watcher"></div></div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-header"><span class="panel-title">Privacy</span></div>
          <div class="config-section">
            <div class="config-row"><div><div class="config-key">Local-only mode</div><div class="config-desc">Never send data to any external service</div></div><div class="toggle ${general.local_only !== false ? 'on' : ''}" data-cfg="general.local_only"></div></div>
            <div class="config-row"><div><div class="config-key">Retention</div><div class="config-desc">How long to keep event data</div></div><code class="config-val">${general.retention_days || 90} days</code></div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-header"><span class="panel-title">Web UI</span></div>
          <div class="config-section">
            <div class="config-row"><div><div class="config-key">Port</div><div class="config-desc">Port for devpulse web server</div></div><code class="config-val">${ui.port || 8765}</code></div>
            <div class="config-row"><div><div class="config-key">Bind address</div><div class="config-desc">Network interface to bind to</div></div><code class="config-val">${esc(ui.host || '127.0.0.1')}</code></div>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header"><span class="panel-title">Daemon status</span></div>
        <div class="panel-body">
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px">
            <div><div style="font-size:10px;color:var(--ink-tertiary);margin-bottom:4px">PID</div><code style="font-family:var(--mono);font-size:13px;color:var(--ink)">${st.pid || '—'}</code></div>
            <div><div style="font-size:10px;color:var(--ink-tertiary);margin-bottom:4px">Uptime</div><code style="font-family:var(--mono);font-size:13px;color:var(--ink)">${esc(st.uptime||'—')}</code></div>
            <div><div style="font-size:10px;color:var(--ink-tertiary);margin-bottom:4px">Events today</div><code style="font-family:var(--mono);font-size:13px;color:var(--ink)">${st.total_events||0}</code></div>
            <div><div style="font-size:10px;color:var(--ink-tertiary);margin-bottom:4px">DB size</div><code style="font-family:var(--mono);font-size:13px;color:var(--ink)">${esc(st.db_size||'—')}</code></div>
          </div>
          <div style="margin-top:16px;display:flex;gap:8px">
            <button class="btn" id="restart-daemon-btn">Restart daemon</button>
            <button class="btn" id="stop-daemon-btn" style="color:var(--danger);border-color:rgba(232,123,90,0.3)">Stop daemon</button>
          </div>
        </div>
      </div>
    `;

    el.querySelectorAll('.toggle').forEach(t => {
      t.addEventListener('click', () => t.classList.toggle('on'));
    });

    document.getElementById('save-config-btn').addEventListener('click', async () => {
      const updates = {};
      el.querySelectorAll('.toggle[data-cfg]').forEach(t => {
        updates[t.dataset.cfg] = t.classList.contains('on');
      });
      const provSelect = document.getElementById('cfg-llm-provider');
      if (provSelect) updates['llm.provider'] = provSelect.value.replace(' (local)', '');
      try {
        await api('/api/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(updates),
        });
        const btn = document.getElementById('save-config-btn');
        btn.textContent = 'Saved!';
        setTimeout(() => { btn.textContent = 'Save changes'; }, 2000);
      } catch (err) {
        alert('Save failed: ' + err.message);
      }
    });

    document.getElementById('restart-daemon-btn').addEventListener('click', async () => {
      try {
        await api('/api/daemon/restart', { method: 'POST' });
        renderConfig();
      } catch {}
    });
    document.getElementById('stop-daemon-btn').addEventListener('click', async () => {
      try {
        await api('/api/daemon/stop', { method: 'POST' });
        renderConfig();
      } catch {}
    });
  } catch (err) {
    el.innerHTML = `<div class="loading-text" style="color:var(--danger)">Failed to load config: ${esc(err.message)}</div>`;
  }
}

// ── Navigation & Init ────────────────────────────────────────────
const renderFns = { today: renderToday, week: renderWeek, projects: renderProjects, toil: renderToil, focus: renderFocus, insights: renderInsights, config: renderConfig };

function navigate(view) {
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  document.querySelector(`.nav-item[data-view="${view}"]`)?.classList.add('active');
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  const el = document.getElementById(`view-${view}`);
  if (el) el.classList.add('active');
  document.getElementById('main').scrollTop = 0;
  renderFns[view]?.();
}

document.querySelectorAll('.nav-item[data-view]').forEach(item => {
  item.addEventListener('click', e => { e.preventDefault(); navigate(item.dataset.view); });
});

async function refreshAll() {
  const view = document.querySelector('.nav-item.active')?.dataset?.view || 'today';
  renderFns[view]?.();
  updateTopbar();
}

async function updateTopbar() {
  const now = new Date();
  document.getElementById('topbar-date').textContent = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }) + ' · ' + now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
  document.getElementById('topbar-addr').textContent = 'localhost:' + (location.port || '8765');

  try {
    const st = await api('/api/status');
    const pill = document.getElementById('status-pill');
    const text = document.getElementById('status-text');
    if (st.daemon_running) {
      pill.classList.remove('stopped');
      text.textContent = 'daemon running';
    } else {
      pill.classList.add('stopped');
      text.textContent = 'daemon stopped';
    }
  } catch {
    document.getElementById('status-text').textContent = 'connecting…';
  }
}

updateTopbar();
renderToday();
setInterval(() => {
  updateTopbar();
  const view = document.querySelector('.nav-item.active')?.dataset?.view || 'today';
  if (view === 'today') renderToday();
}, 60000);
</script>
</body>
</html>
